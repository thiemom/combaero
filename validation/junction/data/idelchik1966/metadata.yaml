  # ----- 7-1: K12, alpha=30 (branch loss, joining wye) -----
  idelchik_diag7-1_K12_theta=30_psi=1_tabulated.csv:     {K_id: K12, psi: 1.0,   theta_deg: 30, x_axis: q, flow_regime: joining, kind: tabulated}
  idelchik_diag7-1_K12_theta=30_psi=1.25_tabulated.csv:  {K_id: K12, psi: 1.25,  theta_deg: 30, x_axis: q, flow_regime: joining, kind: tabulated}
