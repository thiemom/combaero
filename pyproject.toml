[build-system]
requires = ["scikit-build-core>=0.10", "pybind11>=2.12"]
build-backend = "scikit_build_core.build"

[project]
name = "combaero"
version = "0.2.0"
description = "Combustion and aerothermal tools (C++ core with Python bindings)"
readme = "README.md"
requires-python = ">=3.9"
dependencies = ["numpy>=1.24", "scipy>=1.10"]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "ruff>=0.8.0",
    "mypy>=1.12.0",
    "pre-commit>=4.0.0",
    "build>=1.2.0",
]
examples = ["matplotlib>=3.8"]
generator = ["pandas>=2.2.3", "pyyaml>=6.0.2"]
gui = ["fastapi", "uvicorn", "pydantic", "pandas"]

[tool.scikit-build]
# Python package lives under python/combaero
wheel.packages = ["python/combaero"]
build.verbose = true

[tool.scikit-build.cmake]
args = ["-DCOMBAERO_ENABLE_TESTS=OFF", "-DCOMBAERO_BUILD_PYTHON=ON"]

[tool.uv]
managed = true
package = true
dev-dependencies = ["pytest-cov"]

[tool.uv.workspace]
members = ["cantera_validation_tests"]
