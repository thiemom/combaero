[pytest]
testpaths = cantera_validation_tests
norecursedirs = build build_tmp _deps .venv .cache __pycache__
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
