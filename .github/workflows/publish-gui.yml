name: Publish combaero-gui to PyPI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build combaero-gui
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: '3.12'

      - uses: pnpm/action-setup@v6
        with:
          version: latest

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: gui/frontend/pnpm-lock.yaml

      - name: Build frontend
        working-directory: gui/frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Build wheel and sdist
        run: uv build --package combaero-gui

      - uses: actions/upload-artifact@v7
        with:
          name: dist-gui
          path: dist/combaero_gui-*

  verify:
    name: Verify wheel (smoke test)
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist-gui
          path: dist/

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.12'

      - name: Check wheel contains JS assets
        run: |
          python - <<'EOF'
          import zipfile, sys, glob
          wheels = glob.glob("dist/combaero_gui-*.whl")
          if not wheels:
              print("ERROR: no wheel found in dist/")
              sys.exit(1)
          with zipfile.ZipFile(wheels[0]) as z:
              names = z.namelist()
          js = [n for n in names if n.endswith(".js") and "/assets/" in n]
          css = [n for n in names if n.endswith(".css") and "/assets/" in n]
          html = [n for n in names if n.endswith("index.html")]
          print(f"index.html entries : {html}")
          print(f"JS files in assets : {js}")
          print(f"CSS files in assets: {css}")
          if not js:
              print("FAIL: no JS files found in wheel — frontend/dist/assets/ was not bundled!")
              sys.exit(1)
          if not html:
              print("FAIL: index.html missing from wheel!")
              sys.exit(1)
          print("OK: wheel contents look good")
          EOF

      - name: Wait for matching combaero release on PyPI
        run: |
          # combaero-gui and combaero share a tag/version (both derived via
          # setuptools_scm from the same `v*` tag), but publish.yml builds
          # wheels for 3 OSes and is slower than this workflow -- poll until
          # the matching combaero version actually lands on the index instead
          # of racing it (see #232 follow-up: first v0.4.0 attempt failed
          # because "No solution found" resolving combaero>=0.4 too early).
          #
          # Poll the Simple Repository index (the endpoint `uv pip install`
          # actually resolves against), not the JSON API: on the v0.4.1
          # release the JSON API reported the new version several minutes
          # before it was visible via /simple/ (separate CDN cache), so the
          # install step below silently resolved the prior (broken) version
          # instead of failing.
          GUI_WHEEL=$(ls dist/combaero_gui-*.whl)
          VERSION=$(basename "$GUI_WHEEL" | cut -d- -f2)
          echo "Waiting for combaero==$VERSION on the PyPI simple index..."
          for i in $(seq 1 40); do
            if curl -fsS "https://pypi.org/simple/combaero/" 2>/dev/null | grep -q "combaero-$VERSION"; then
              echo "Found combaero==$VERSION on PyPI after $((i - 1)) retries."
              exit 0
            fi
            sleep 15
          done
          echo "FAIL: combaero==$VERSION did not appear on PyPI within 10 minutes"
          exit 1

      - name: Install wheel and smoke-test server
        run: |
          uv venv .test-venv
          # install wheel (combaero is a dependency, pulled from PyPI)
          uv pip install --python .test-venv dist/combaero_gui-*.whl
          .test-venv/bin/combaero-gui &
          SERVER_PID=$!
          # poll instead of a fixed sleep -- a fixed 4s sleep flaked on the
          # v0.4.1 release when server startup (heavier now with the MPCE
          # junction models) took slightly longer than that.
          for i in $(seq 1 20); do
            curl -fsS http://localhost:8000/health > /dev/null 2>&1 && break
            if [ "$i" -eq 20 ]; then
              echo "FAIL: server did not respond on :8000/health within 10s"
              kill $SERVER_PID
              exit 1
            fi
            sleep 0.5
          done
          # health endpoint must respond 200
          curl -fsS http://localhost:8000/health
          # root must serve HTML (index.html), not JSON
          # Use GET — modern Starlette does not auto-generate HEAD for @app.get() routes.
          ROOT_BODY=$(curl -s http://localhost:8000/)
          echo "$ROOT_BODY" | grep -qi "<!doctype html>" || { echo "FAIL: / did not return HTML"; kill $SERVER_PID; exit 1; }
          # a JS asset must NOT return text/html
          JS_PATH=$(echo "$ROOT_BODY" | grep -o 'src="[^"]*\.js"' | head -1 | sed 's/src="//;s/"//')
          echo "Detected JS path: $JS_PATH"
          if [ -n "$JS_PATH" ]; then
            JS_CT=$(curl -s -o /dev/null -w '%{content_type}' "http://localhost:8000${JS_PATH}")
            echo "JS content-type: $JS_CT"
            echo "$JS_CT" | grep -qi "text/html" && { echo "FAIL: JS asset served as HTML — MIME bug present!"; kill $SERVER_PID; exit 1; }
          fi
          kill $SERVER_PID
          echo "All smoke tests passed"

  publish:
    name: Publish
    needs: verify
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist-gui
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
