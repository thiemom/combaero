name: Validation Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    outputs:
      source: ${{ steps.filter.outputs.source }}
      documentation: ${{ steps.filter.outputs.documentation }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect source vs documentation changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            source:
              - 'src/**'
              - 'include/**'
              - 'python/**'
              - 'tests/**'
              - 'cantera_validation_tests/**'
              - 'scripts/**'
              - 'examples/**'
              - '.github/workflows/**'
              - 'CMakeLists.txt'
              - 'pyproject.toml'
              - '.pre-commit-config.yaml'
              - 'ruff.toml'
              - '.python-version'
              - 'Makefile'
            documentation:
              - 'docs/**'
              - 'README.md'
              - '**/*.md'

  cantera-validation:
    name: Test Cantera Validation
    needs: changes
    if: needs.changes.outputs.source == 'true'
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest ]
        python-version: [ '3.12' ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        with:
          path: cantera_validation_tests/.venv
          key: venv-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('cantera_validation_tests/poetry.lock') }}

      - name: Install validation test dependencies
        working-directory: cantera_validation_tests
        run: |
          poetry install --no-interaction

      - name: Build and install CombAero Python package
        run: |
          python -m pip install build
          python -m build --wheel
          cd cantera_validation_tests
          poetry run python -m pip install --force-reinstall ../dist/*.whl

      - name: Run combustion validation tests
        working-directory: cantera_validation_tests
        run: |
          poetry run pytest test_combustion_validation.py -v --tb=short

      - name: Run equilibrium validation tests
        working-directory: cantera_validation_tests
        run: |
          poetry run pytest test_equilibrium_validation.py -v --tb=short

      - name: Run transport validation tests
        working-directory: cantera_validation_tests
        run: |
          poetry run pytest test_transport_validation.py -v --tb=short

      - name: Run mixing validation tests
        working-directory: cantera_validation_tests
        run: |
          poetry run pytest test_mixing_validation.py -v --tb=short || true

      - name: Generate test report
        if: always()
        working-directory: cantera_validation_tests
        run: |
          poetry run pytest --tb=no --no-header -q > test_summary.txt || true
          cat test_summary.txt

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-results-${{ matrix.os }}-py${{ matrix.python-version }}
          path: cantera_validation_tests/test_summary.txt

  python-unit-tests:
    name: Test Python Unit
    needs: changes
    if: needs.changes.outputs.source == 'true'
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest ]
        python-version: [ '3.12' ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build CombAero Python package
        run: |
          python -m pip install --upgrade pip build pytest numpy
          python -m build --wheel
          python -m pip install --force-reinstall dist/*.whl

      - name: Run Python unit tests
        working-directory: python/tests
        run: |
          python -m pytest -v --tb=short

  status-check:
    name: validation-gatekeeper
    needs: [changes, cantera-validation, python-unit-tests]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate validation workflow outcomes
        shell: bash
        run: |
          source_changed="${{ needs.changes.outputs.source }}"
          cantera_result="${{ needs.cantera-validation.result }}"
          py_unit_result="${{ needs.python-unit-tests.result }}"

          echo "source_changed=${source_changed}"
          echo "cantera_result=${cantera_result}"
          echo "py_unit_result=${py_unit_result}"

          if [[ "${source_changed}" != "true" ]]; then
            echo "Documentation-only (or non-source) change detected. Passing status-check."
            exit 0
          fi

          if [[ "${cantera_result}" == "success" && "${py_unit_result}" == "success" ]]; then
            echo "All validation jobs succeeded."
            exit 0
          fi

          echo "One or more validation jobs failed or were cancelled."
          exit 1
