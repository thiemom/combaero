name: Validation Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    outputs:
      source: ${{ steps.filter.outputs.source }}
      documentation: ${{ steps.filter.outputs.documentation }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect source vs documentation changes
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            source:
              - 'src/**'
              - 'include/**'
              - 'python/**'
              - 'tests/**'
              - 'cantera_validation_tests/**'
              - 'scripts/**'
              - 'gui/**'
              - 'examples/**'
              - '.github/workflows/**'
              - 'CMakeLists.txt'
              - 'pyproject.toml'
              - '.pre-commit-config.yaml'
              - 'ruff.toml'
              - '.python-version'
              - 'Makefile'
            documentation:
              - 'docs/**'
              - 'README.md'
              - '**/*.md'

  cantera-validation:
    name: Test Cantera Validation
    needs: changes
    if: needs.changes.outputs.source == 'true'
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest ]
        python-version: [ '3.12' ]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras --all-groups

      - name: Run combustion validation tests
        working-directory: cantera_validation_tests
        run: |
          uv run pytest test_combustion_validation.py -v --tb=short

      - name: Run equilibrium validation tests
        working-directory: cantera_validation_tests
        run: |
          uv run pytest test_equilibrium_validation.py -v --tb=short

      - name: Run transport validation tests
        working-directory: cantera_validation_tests
        run: |
          uv run pytest test_transport_validation.py -v --tb=short

      - name: Run mixing validation tests
        working-directory: cantera_validation_tests
        run: |
          uv run pytest test_mixing_validation.py -v --tb=short || true

      - name: Generate test report
        if: always()
        working-directory: cantera_validation_tests
        run: |
          uv run pytest --tb=no --no-header -q > test_summary.txt || true
          cat test_summary.txt

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: validation-results-${{ matrix.os }}-py${{ matrix.python-version }}
          path: cantera_validation_tests/test_summary.txt

  python-unit-tests:
    name: Test Python Unit
    needs: changes
    if: needs.changes.outputs.source == 'true'
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest ]
        python-version: [ '3.12' ]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras --all-groups

      - name: Run Python unit tests
        working-directory: python/tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          uv run pytest -v --tb=short

  frontend-validation:
    name: Frontend Validation (Node 24 LTS)
    needs: changes
    if: needs.changes.outputs.source == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
          cache-dependency-path: 'gui/frontend/pnpm-lock.yaml'
      - name: Install dependencies
        run: pnpm install
        working-directory: gui/frontend
      - name: Run validation
        run: |
          pnpm run lint
          pnpm run test
          pnpm run build
        working-directory: gui/frontend

  status-check:
    # IMPORTANT: Keep this literal name in sync with Iron ruleset required context:
    # "Validation Tests / status-check". Ruleset matching is strict and relies on exact string equality.
    name: Validation Tests / status-check
    needs: [changes, cantera-validation, python-unit-tests, frontend-validation]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate validation workflow outcomes
        shell: bash
        run: |
          source_changed="${{ needs.changes.outputs.source }}"
          cantera_result="${{ needs.cantera-validation.result }}"
          py_unit_result="${{ needs.python-unit-tests.result }}"
          frontend_result="${{ needs.frontend-validation.result }}"

          echo "source_changed=${source_changed}"
          echo "cantera_result=${cantera_result}"
          echo "py_unit_result=${py_unit_result}"
          echo "frontend_result=${frontend_result}"

          if [[ "${source_changed}" != "true" ]]; then
            echo "Documentation-only (or non-source) change detected. Passing status-check."
            exit 0
          fi

          # Allow success OR skipped if no relevant changes triggered it
          is_success() {
            [[ "$1" == "success" || "$1" == "skipped" ]]
          }

          if is_success "${cantera_result}" && is_success "${py_unit_result}" && is_success "${frontend_result}"; then
            echo "All validation jobs succeeded or were correctly skipped."
            exit 0
          fi

          echo "One or more validation jobs failed or were cancelled."
          exit 1
