name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint:
    name: Lint & Style Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check C++ source code style
        run: ./scripts/check-source-style.sh --verbose

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python style tools
        run: pip install ruff mypy

      - name: Check Python code style
        run: ./scripts/check-python-style.sh --verbose

  build-and-test:
    name: Build & Test C++ (${{ matrix.os }}, ${{ matrix.build_type }})
    needs: lint
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
        build_type: [ Release ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up CMake
        uses: jwlawson/actions-setup-cmake@v1

      - name: Configure
        shell: bash
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }}

      - name: Run tests (ctest)
        working-directory: build
        run: |
          ctest --output-on-failure

      - name: Run accuracy tests
        working-directory: build
        if: runner.os != 'Windows'
        run: |
          ./tests/test_ice_equation_accuracy
          ./tests/test_water_equation_accuracy

  build-mingw:
    name: Build MinGW
    needs: lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MinGW-w64
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64

      - name: Configure (CMake with MinGW)
        run: |
          cmake -S . -B build-mingw \
            -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/.github/workflows/toolchain-mingw.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DCOMBAERO_ENABLE_TESTS=OFF

      - name: Build Windows binaries
        run: cmake --build build-mingw --config Release
