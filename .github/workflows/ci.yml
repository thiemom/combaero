name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    outputs:
      source: ${{ steps.filter.outputs.source }}
      gui: ${{ steps.filter.outputs.gui }}
      documentation: ${{ steps.filter.outputs.documentation }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect source vs documentation changes
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            source:
              - 'src/**'
              - 'include/**'
              - 'python/**'
              - 'tests/**'
              - 'scripts/**'
              - 'examples/**'
              - '.github/workflows/**'
              - 'CMakeLists.txt'
              - 'pyproject.toml'
              - '.pre-commit-config.yaml'
              - 'ruff.toml'
              - 'Makefile'
            gui:
              - 'gui/**'
            documentation:
              - 'docs/**'
              - 'README.md'
              - '**/*.md'

  lint:
    name: Lint & Style Checks
    needs: changes
    if: needs.changes.outputs.source == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check C++ source code style
        run: ./scripts/check-source-style.sh --verbose

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync --no-install-workspace --all-extras --all-groups

      - name: Check Python code style
        run: uv run ./scripts/check-python-style.sh --verbose

  lint-gui:
    name: Lint & Style Checks (GUI)
    needs: changes
    if: needs.changes.outputs.gui == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync --no-install-workspace --all-extras --all-groups

      - name: Check Python style (GUI backend)
        run: uv run ruff check gui/ && uv run ruff format --check gui/

      - name: Set up Biome
        uses: biomejs/setup-biome@v2
        with:
          version: 2.4.9

      - name: Check frontend style (Biome)
        run: biome check gui/frontend/src

  build-and-test:
    name: Build & Test C++ (${{ matrix.os }}, ${{ matrix.build_type }})
    needs: [changes, lint]
    if: needs.changes.outputs.source == 'true'
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
        build_type: [ Release ]

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up uv (Build dependencies)
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: '3.12'

      - name: Install build dependencies
        run: uv sync --no-install-workspace --all-extras --all-groups

      - name: Set up CMake
        uses: jwlawson/actions-setup-cmake@v2

      - name: Configure (Ninja on Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

      - name: Configure (default generator)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }} --parallel

      - name: Run tests (ctest)
        working-directory: build
        run: |
          ctest --output-on-failure --parallel

      - name: Run accuracy tests
        working-directory: build
        if: runner.os != 'Windows'
        run: |
          ./test_ice_equation_accuracy
          ./test_water_equation_accuracy

  build-mingw:
    name: Build MinGW
    needs: [changes, lint]
    if: needs.changes.outputs.source == 'true'
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Add MinGW to PATH
        run: echo "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Verify MinGW
        run: |
          gcc --version
          g++ --version

      - name: Configure (CMake with MinGW)
        run: |
          cmake -G "MinGW Makefiles" -S . -B build-mingw `
            -DCMAKE_BUILD_TYPE=Release `
            -DCOMBAERO_ENABLE_TESTS=OFF

      - name: Build Windows binaries
        run: cmake --build build-mingw --config Release

  build-python-windows:
    name: Build Python Extension (Windows/MSVC)
    needs: [changes, lint]
    if: needs.changes.outputs.source == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: '3.12'

      - name: Build Python extension (MSVC)
        run: uv pip install -e .

  status-check:
    # IMPORTANT: Keep this literal name in sync with Iron ruleset required context:
    # "CI / status-check". Ruleset matching is strict and relies on exact string equality.
    name: CI / status-check
    needs: [changes, lint, lint-gui, build-and-test, build-mingw, build-python-windows]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate CI outcomes
        shell: bash
        run: |
          source_changed="${{ needs.changes.outputs.source }}"
          gui_changed="${{ needs.changes.outputs.gui }}"
          lint_result="${{ needs.lint.result }}"
          lint_gui_result="${{ needs.lint-gui.result }}"
          build_result="${{ needs.build-and-test.result }}"
          mingw_result="${{ needs.build-mingw.result }}"
          build_python_windows_result="${{ needs.build-python-windows.result }}"

          echo "source_changed=${source_changed}"
          echo "gui_changed=${gui_changed}"
          echo "lint_result=${lint_result}"
          echo "lint_gui_result=${lint_gui_result}"
          echo "build_result=${build_result}"
          echo "mingw_result=${mingw_result}"
          echo "build_python_windows_result=${build_python_windows_result}"

          if [[ "${source_changed}" == "true" ]]; then
            if [[ "${lint_result}" != "success" || "${build_result}" != "success" || "${mingw_result}" != "success" || "${build_python_windows_result}" != "success" ]]; then
              echo "One or more source-related jobs failed or were cancelled."
              exit 1
            fi
          fi

          if [[ "${gui_changed}" == "true" ]]; then
            if [[ "${lint_gui_result}" != "success" ]]; then
              echo "GUI lint job failed or was cancelled."
              exit 1
            fi
          fi

          echo "All required checks passed."
          exit 0
