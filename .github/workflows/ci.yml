name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    outputs:
      source: ${{ steps.filter.outputs.source }}
      documentation: ${{ steps.filter.outputs.documentation }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect source vs documentation changes
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            source:
              - 'src/**'
              - 'include/**'
              - 'python/**'
              - 'tests/**'
              - 'scripts/**'
              - 'examples/**'
              - '.github/workflows/**'
              - 'CMakeLists.txt'
              - 'pyproject.toml'
              - '.pre-commit-config.yaml'
              - 'ruff.toml'
              - 'Makefile'
            documentation:
              - 'docs/**'
              - 'README.md'
              - '**/*.md'

  lint:
    name: Lint & Style Checks
    needs: changes
    if: needs.changes.outputs.source == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check C++ source code style
        run: ./scripts/check-source-style.sh --verbose

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync --all-extras --all-groups

      - name: Check Python code style
        run: uv run ./scripts/check-python-style.sh --verbose

  build-and-test:
    name: Build & Test C++ (${{ matrix.os }}, ${{ matrix.build_type }})
    needs: [changes, lint]
    if: needs.changes.outputs.source == 'true'
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
        build_type: [ Release ]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv (Build dependencies)
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false
          python-version: '3.12'

      - name: Install Ninja (Windows)
        if: runner.os == 'Windows'
        run: uv pip install ninja

      - name: Set up CMake
        uses: jwlawson/actions-setup-cmake@v2

      - name: Configure (Ninja on Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

      - name: Configure (default generator)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }} --parallel

      - name: Run tests (ctest)
        working-directory: build
        run: |
          ctest --output-on-failure --parallel

      - name: Run accuracy tests
        working-directory: build
        if: runner.os != 'Windows'
        run: |
          ./test_ice_equation_accuracy
          ./test_water_equation_accuracy

  build-mingw:
    name: Build MinGW
    needs: [changes, lint]
    if: needs.changes.outputs.source == 'true'
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Add MinGW to PATH
        run: echo "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Verify MinGW
        run: |
          gcc --version
          g++ --version

      - name: Configure (CMake with MinGW)
        run: |
          cmake -G "MinGW Makefiles" -S . -B build-mingw `
            -DCMAKE_BUILD_TYPE=Release `
            -DCOMBAERO_ENABLE_TESTS=OFF

      - name: Build Windows binaries
        run: cmake --build build-mingw --config Release

  status-check:
    # IMPORTANT: Keep this literal name in sync with Iron ruleset required context:
    # "CI / status-check". Ruleset matching is strict and relies on exact string equality.
    name: CI / status-check
    needs: [changes, lint, build-and-test, build-mingw]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate CI outcomes
        shell: bash
        run: |
          source_changed="${{ needs.changes.outputs.source }}"
          lint_result="${{ needs.lint.result }}"
          build_result="${{ needs.build-and-test.result }}"
          mingw_result="${{ needs.build-mingw.result }}"

          echo "source_changed=${source_changed}"
          echo "lint_result=${lint_result}"
          echo "build_result=${build_result}"
          echo "mingw_result=${mingw_result}"

          if [[ "${source_changed}" != "true" ]]; then
            echo "Documentation-only (or non-source) change detected. Passing status-check."
            exit 0
          fi

          if [[ "${lint_result}" == "success" && "${build_result}" == "success" && "${mingw_result}" == "success" ]]; then
            echo "All source-related jobs succeeded."
            exit 0
          fi

          echo "One or more source-related jobs failed or were cancelled."
          exit 1
