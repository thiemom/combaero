name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    outputs:
      source: ${{ steps.filter.outputs.source }}
      documentation: ${{ steps.filter.outputs.documentation }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect source vs documentation changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            source:
              - 'src/**'
              - 'include/**'
              - 'python/**'
              - 'tests/**'
              - 'scripts/**'
              - 'examples/**'
              - '.github/workflows/**'
              - 'CMakeLists.txt'
              - 'pyproject.toml'
              - '.pre-commit-config.yaml'
              - 'ruff.toml'
              - 'Makefile'
            documentation:
              - 'docs/**'
              - 'README.md'
              - '**/*.md'

  lint:
    name: Lint & Style Checks
    needs: changes
    if: needs.changes.outputs.source == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check C++ source code style
        run: ./scripts/check-source-style.sh --verbose

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python style tools
        run: pip install ruff mypy

      - name: Check Python code style
        run: ./scripts/check-python-style.sh --verbose

  build-and-test:
    name: Build & Test C++ (${{ matrix.os }}, ${{ matrix.build_type }})
    needs: [changes, lint]
    if: needs.changes.outputs.source == 'true'
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
        build_type: [ Release ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up CMake
        uses: jwlawson/actions-setup-cmake@v1

      - name: Configure
        shell: bash
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }}

      - name: Run tests (ctest)
        working-directory: build
        run: |
          ctest --output-on-failure

      - name: Run accuracy tests
        working-directory: build
        if: runner.os != 'Windows'
        run: |
          ./tests/test_ice_equation_accuracy
          ./tests/test_water_equation_accuracy

  build-mingw:
    name: Build MinGW
    needs: [changes, lint]
    if: needs.changes.outputs.source == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MinGW-w64
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64

      - name: Configure (CMake with MinGW)
        run: |
          cmake -S . -B build-mingw \
            -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/.github/workflows/toolchain-mingw.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DCOMBAERO_ENABLE_TESTS=OFF

      - name: Build Windows binaries
        run: cmake --build build-mingw --config Release

  status-check:
    name: status-check
    needs: [changes, lint, build-and-test, build-mingw]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate CI outcomes
        shell: bash
        run: |
          source_changed="${{ needs.changes.outputs.source }}"
          lint_result="${{ needs.lint.result }}"
          build_result="${{ needs.build-and-test.result }}"
          mingw_result="${{ needs.build-mingw.result }}"

          echo "source_changed=${source_changed}"
          echo "lint_result=${lint_result}"
          echo "build_result=${build_result}"
          echo "mingw_result=${mingw_result}"

          if [[ "${source_changed}" != "true" ]]; then
            echo "Documentation-only (or non-source) change detected. Passing status-check."
            exit 0
          fi

          if [[ "${lint_result}" == "success" && "${build_result}" == "success" && "${mingw_result}" == "success" ]]; then
            echo "All source-related jobs succeeded."
            exit 0
          fi

          echo "One or more source-related jobs failed or were cancelled."
          exit 1
